# Stack de produção do Mirante Painel.
#
# Pré-requisitos:
# - Copiar `.env.production.example` para `.env.production` e preencher segredos.
# - DNS de painel.mirantegov.cloud (e traefik., studio., minio., clickhouse.
#   .mirantegov.cloud quando habilitados) deve apontar para esta VPS.
# - Portas 80/443 livres no host (Traefik responde por elas).
#
# Subir: docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
# Logs:  docker compose --env-file .env.production -f docker-compose.prod.yml logs -f app

name: mirante-painel

services:
  traefik:
    image: traefik:v3.1
    container_name: mirante-traefik
    env_file:
      - .env.production
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=mirante-painel_mirante"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json"
      # CA server: staging p/ validar sem queimar rate-limit; trocar p/ prod no cutover.
      - "--certificatesresolvers.letsencrypt.acme.caserver=${TRAEFIK_ACME_CASERVER}"
      - "--api.dashboard=true"
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-acme:/acme
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`${TRAEFIK_DASHBOARD_DOMAIN}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth"
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"
    restart: unless-stopped
    networks:
      - mirante

  app:
    build: .
    image: mirante-painel:prod
    container_name: mirante-painel-app
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.app.middlewares=sec-headers@docker"
      - "traefik.http.services.app.loadbalancer.server.port=3000"
      - "traefik.http.services.app.loadbalancer.healthcheck.path=/api/health"
      - "traefik.http.services.app.loadbalancer.healthcheck.interval=30s"
      # Headers de segurança (E2.4)
      - "traefik.http.middlewares.sec-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.sec-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.sec-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.sec-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.sec-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.sec-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      # Rate-limit só no login (E2.5): router dedicado de maior prioridade
      - "traefik.http.middlewares.login-rl.ratelimit.average=5"
      - "traefik.http.middlewares.login-rl.ratelimit.burst=10"
      - "traefik.http.routers.app-login.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/api/auth/login`)"
      - "traefik.http.routers.app-login.entrypoints=websecure"
      - "traefik.http.routers.app-login.tls.certresolver=letsencrypt"
      - "traefik.http.routers.app-login.service=app"
      - "traefik.http.routers.app-login.priority=100"
      - "traefik.http.routers.app-login.middlewares=sec-headers@docker,login-rl@docker"
    restart: unless-stopped
    networks:
      - mirante

  postgres:
    image: postgres:16-bookworm
    container_name: mirante-postgres
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # Auditoria via DataGrip. Restringir por firewall/allowlist no UFW.
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./supabase/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - mirante

  minio:
    image: minio/minio:latest
    container_name: mirante-minio
    env_file:
      - .env.production
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "127.0.0.1:${MINIO_EXTERNAL_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_EXTERNAL_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - mirante

  # Cria o bucket `mirante-parquet` no primeiro `up` (idempotente) e encerra.
  minio-init:
    image: minio/mc:latest
    container_name: mirante-minio-init
    env_file:
      - .env.production
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY} &&
      mc mb --ignore-existing local/${S3_BUCKET} &&
      echo 'bucket pronto: ${S3_BUCKET}'
      "
    restart: "no"
    networks:
      - mirante

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    container_name: mirante-clickhouse
    env_file:
      - .env.production
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9100}:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' --password ${CLICKHOUSE_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - mirante

networks:
  mirante:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  clickhouse-data:
  clickhouse-logs:
  traefik-acme:
