# Stack de produção do Mirante Painel.
#
# Pré-requisitos:
# - Copiar `.env.production.example` para `.env.production` e preencher segredos.
# - DNS de painel.mirantegov.cloud (e traefik., studio., minio., clickhouse.
#   .mirantegov.cloud quando habilitados) deve apontar para esta VPS.
# - Portas 80/443 livres no host (Traefik responde por elas).
#
# Subir: docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
# Logs:  docker compose --env-file .env.production -f docker-compose.prod.yml logs -f app

name: mirante-painel

services:
  traefik:
    image: traefik:v3.1
    container_name: mirante-traefik
    env_file:
      - .env.production
    command:
      # Provider de ARQUIVO (sem docker.sock): evita mismatch de API com Docker 29.
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json"
      # CA server: staging p/ validar sem queimar rate-limit; trocar p/ prod no cutover.
      - "--certificatesresolvers.letsencrypt.acme.caserver=${TRAEFIK_ACME_CASERVER}"
      # Dashboard adiado (file provider + usersFile no futuro); foco no app HTTPS.
      - "--api.dashboard=false"
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - traefik-acme:/acme
      - ./infra/traefik/dynamic:/etc/traefik/dynamic:ro
    restart: unless-stopped
    networks:
      - mirante

  app:
    build: .
    image: mirante-painel:prod
    container_name: mirante-painel-app
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Next.js standalone faz bind no HOSTNAME; sem isto o Docker seta HOSTNAME=<id do
      # container> e o app não escuta em 127.0.0.1 (healthcheck falha). 0.0.0.0 = todas
      # as interfaces (Traefik continua alcançando via IP do container).
      HOSTNAME: "0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Roteamento agora no file provider: infra/traefik/dynamic/app.yml
    restart: unless-stopped
    networks:
      - mirante

  postgres:
    image: postgres:16-bookworm
    container_name: mirante-postgres
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # Auditoria via DataGrip. Restringir por firewall/allowlist no UFW.
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./supabase/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - mirante

  minio:
    image: minio/minio:latest
    container_name: mirante-minio
    env_file:
      - .env.production
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "127.0.0.1:${MINIO_EXTERNAL_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_EXTERNAL_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - mirante

  # Cria o bucket `mirante-parquet` no primeiro `up` (idempotente) e encerra.
  minio-init:
    image: minio/mc:latest
    container_name: mirante-minio-init
    env_file:
      - .env.production
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY} &&
      mc mb --ignore-existing local/${S3_BUCKET} &&
      echo 'bucket pronto: ${S3_BUCKET}'
      "
    restart: "no"
    networks:
      - mirante

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    container_name: mirante-clickhouse
    env_file:
      - .env.production
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9100}:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' --password ${CLICKHOUSE_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - mirante

networks:
  mirante:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  clickhouse-data:
  clickhouse-logs:
  traefik-acme:
