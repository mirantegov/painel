# ClickHouse — armazém canônico SIM-AM (TCE-PR).
# Pipeline: MinIO -> simam_raw (landing) -> ETL -> simam (dados tratados, layout SIM-AM).
#
#   docker compose up -d        # sobe o servidor (porta 8123 HTTP / 9000 nativo)
#   docker compose down         # para (dados persistem em ./data)
#
# Dados em volume bind ./data (gitignored). Config em ./config (config.d + users.d).
# DDL/seeds aplicados na inicialização via /docker-entrypoint-initdb.d.

services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    container_name: simam_clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123" # HTTP / clickhouse-client --port 8123
      - "9100:9000" # protocolo nativo (host 9100; 9000 já é do MinIO)
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./data:/var/lib/clickhouse
      - ./logs:/var/log/clickhouse-server
      - ./config/config.d:/etc/clickhouse-server/config.d:ro
      - ./config/users.d:/etc/clickhouse-server/users.d:ro
      - ./schema:/docker-entrypoint-initdb.d/schema:ro
      - ./tools/init.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 6
