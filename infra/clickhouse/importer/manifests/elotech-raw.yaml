# Import manifest (raw) — GERADO por cmd/genmanifest. NÃO editar à mão.
# Conjunto de tabelas raw ESPERADAS no MinIO, derivado do contrato do
# exportador. Regenere com `make manifests-gen`; confira com `make manifests-check`.
# Fontes:
#   - ../../../exporter/manifests/elotech-eloweb.yaml
#   - ../../../exporter/manifests/elotech-aise.yaml
#   - ../../../exporter/manifests/elotech-apice.yaml
