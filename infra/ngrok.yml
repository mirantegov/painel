# ngrok — expõe o MinIO local publicamente para testes de importação (Épico 4).
# Pré-requisito (uma vez): ngrok config add-authtoken <SEU_TOKEN>   (conta grátis em ngrok.com)
#
# O add-authtoken grava no config GLOBAL (~/Library/Application Support/ngrok/ngrok.yml
# no macOS). Como --config substitui o config padrão, passe os DOIS arquivos:
#
#   ngrok start --all \
#     --config "$HOME/Library/Application Support/ngrok/ngrok.yml" \
#     --config infra/ngrok.yml
#
# (Linux: ~/.config/ngrok/ngrok.yml)
#
# IMPORTANTE — free tier dá 1 URL pública por agente. Por isso expomos APENAS a
# API S3 (9000), que é o que o cliente/exportador usa. Dois túneis na mesma URL
# colidem e roteiam errado (a request S3 cai no console e falha com
# "S3 API Requests must be made to API port").
#
# Subir (single tunnel, free tier):
#   ngrok start minio-s3 \
#     --config "$HOME/Library/Application Support/ngrok/ngrok.yml" \
#     --config infra/ngrok.yml
#   # equivalente: ngrok http 9000
#
# Console (9001): use local em http://127.0.0.1:9001, ou exponha à parte com
#   ngrok http 9001   (só ganha URL própria simultânea em plano pago).
# A URL é efêmera (muda a cada restart) salvo domínio reservado (plano pago).
version: "3"
tunnels:
  minio-s3:
    proto: http
    addr: 9000 # API S3 do MinIO
  # minio-console:   # descomente só em plano pago (URLs simultâneas distintas)
  #   proto: http
  #   addr: 9001
