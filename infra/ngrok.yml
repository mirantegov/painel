# ngrok — expõe o MinIO local publicamente para testes de importação (Épico 4).
# Pré-requisito (uma vez): ngrok config add-authtoken <SEU_TOKEN>   (conta grátis em ngrok.com)
# Subir os 2 túneis:        ngrok start --all --config infra/ngrok.yml
#
# Free tier: 1 agente, múltiplos túneis. As URLs públicas saem no terminal do ngrok.
version: "2"
tunnels:
  minio-s3:
    proto: http
    addr: 9000 # API S3 do MinIO
  minio-console:
    proto: http
    addr: 9001 # Console web do MinIO
