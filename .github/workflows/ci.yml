name: CI

# Gate de qualidade (E0.7): bloqueia o merge se app ou exportador quebrarem.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: App · typecheck · lint · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - name: testes unitários (lógica grupo A)
        run: npm run test:unit
      - name: teste do engine de extração (exporter cron)
        run: bash tests/exporter/export-cliente.test.sh
      - name: audit-modules (invariante - todo módulo ativo tem snapshot)
        run: node scripts/audit-modules.mjs --check

  exporter:
    name: Exportador Go · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
          cache-dependency-path: exporter/go.sum
      - name: go build
        working-directory: exporter
        run: go build ./...
      - name: go vet
        working-directory: exporter
        run: go vet ./...
      - name: go test
        working-directory: exporter
        run: go test ./...

  importer:
    name: Importador Go · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
          cache-dependency-path: infra/clickhouse/importer/go.sum
      - name: go build
        working-directory: infra/clickhouse/importer
        run: go build ./...
      - name: go vet
        working-directory: infra/clickhouse/importer
        run: go vet ./...
      - name: go test
        working-directory: infra/clickhouse/importer
        run: go test ./...
      - name: manifest em dia (sem drift vs exportador)
        working-directory: infra/clickhouse/importer
        run: go run ./cmd/genmanifest --check
