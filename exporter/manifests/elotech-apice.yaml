# Manifest Elotech `apice` — LICITAÇÕES + CONTRATOS (raw).
# Tudo no schema `apice`. (Tributos/RH ficam em `aise`; contábil em `siscop`.)
# Município = IBGE (path no MinIO). Fonte: docs/coleta-apice-tabelas.md.
#
# DECISÃO (b) — exportamos só TABELAS-BASE. As views da Elotech ficam FORA
# (a derivação, ex.: valormaximototal, é reimplementada no ETL). REMOVIDAS deste
# manifest por serem VIEWS (confirmado no dump): cllicitacao_andamento_prev,
# cllicitacaoitem_calculado, view_nadarquivo e as 10 *arquivo (cllicitacaoarquivo,
# clcontratoarquivo, clpedidoarquivo, cllistacompraarquivo, claditivoarquivo,
# clhomologacaoarquivo, clsolicdiariaarquivo, cladjudicacaoarquivo, clminutaarquivo,
# clsolicitacaoarquivo). O conteúdo de arquivos fica na base `apice.arquivo`.
#
# FILTROS DERIVADOS DOS DDLs reais (tmp/eloweb.dump):
#   • `entidade`+exercicio → tabela tem ambas as colunas (transacional cl*).
#   • `entidade`           → tem entidade, sem exercicio.
#   • sem filtro           → dimensões/lookup sem entidade.
# Distribuição: 34 entidade+exercicio · 5 entidade · 14 full (53 tabelas).
#
# ⚠️ PISO DE ANO = 2000 (não 2004 como a contabilidade): contratos em andamento
#    daquela época referenciam licitações antigas. Passe EXERCICIOS começando em
#    2000 (ex.: "2000, 2001, …, 2026"). O filtro de ano usa a coluna `exercicio`
#    da própria licitação/contrato, então licitações 2000+ são preservadas.
#
# Tabelas compartilhadas de nome (pessoa, cidade, entidade, enderecopessoa)
# também existem em `aise` — aqui são objetos SEPARADOS (apice.pessoa ≠ aise.pessoa);
# no MinIO/ClickHouse viram apice_<tabela> vs aise_<tabela> (sem colisão).
#
# Rode com (EXERCICIOS a partir de 2000):
#   go run . --municipio <ibge> --ano <qualquer> \
#            --var ENTIDADES="1, 2, 3" \
#            --var EXERCICIOS="2000, 2001, 2002, ... , 2025, 2026" \
#            --manifest manifests/elotech-apice.yaml
bucket: mirante-parquet
tables:
