  - source: aise.tribimobiliariacadastro
    scope: tenant
  - source: aise.tribimobiliarioitbi # ITBI (idsequencia)
    scope: tenant
  - source: aise.tribproprietarioitbi
    scope: tenant
  - source: aise.tribproprietario
    scope: tenant
  - source: aise.tribvinculo # lookup global
    scope: tenant
  - source: aise.tribatividade # atividade econômica (atividade,cnae)
    scope: tenant
  - source: aise.cnae # lookup global
    scope: tenant

  # ── Localização fiscal (distrito/setor/quadra/loteamento/condomínio) ──
  - source: aise.tribtrecho
    scope: tenant
  - source: aise.tribdistrito
    scope: tenant
  - source: aise.tribsetor
    scope: tenant
  - source: aise.tribsetorquadra
    scope: tenant
  - source: aise.tribloteamento
    scope: tenant
  - source: aise.tribcondominio
    scope: tenant

  # ── Boletim cadastral / modelos ──
  - source: aise.tribboletimmobiliario
    scope: tenant
  - source: aise.tribboletimavulso
    scope: tenant
  - source: aise.tribboletimimobiliariosegmento
    scope: tenant
  - source: aise.tribmodeloresposta
    scope: tenant
  - source: aise.tribmodelocampo
    scope: tenant
  - source: aise.tribtiposegmento # lookup global
    scope: tenant

  # ── Débito: observação extra de arrematação já incluída acima ──

  # ════════════════════════ COMPARTILHADAS (RH ↔ Tributos) ════════════════════════
  - source: aise.entidade # entidades do município
    scope: tenant
    filters: { entidade: [__ENTIDADES__] }
  - source: aise.tribentidadetributacao # entidade, exercicio
    scope: tenant
