  - source: aise.rhpessoa # dados pessoais RH (pessoa) — sem entidade: full
    scope: tenant
  - source: aise.enderecopessoa # endereço da pessoa — sem entidade: full
    scope: tenant
  - source: aise.endereco # endereço — sem entidade: full
    scope: tenant
  - source: aise.contatopessoa # contato da pessoa — sem entidade: full
    scope: tenant
  - source: aise.cidade # lookup global
    scope: tenant
  - source: aise.unidadefederacao # lookup global
    scope: tenant
  - source: aise.logradouro # lookup (por cidade)
    scope: tenant
  - source: aise.tipologradouro # lookup global
    scope: tenant
  - source: aise.bairro # lookup (por cidade)
    scope: tenant
