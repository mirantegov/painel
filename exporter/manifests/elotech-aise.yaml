# Manifest Elotech `aise` — TRIBUTOS + RECURSOS HUMANOS (raw).
# Tudo no schema `aise`. (No `siscop` ficam despesa/receita/financeiro — ver
# elotech-eloweb.yaml.) Município = IBGE (path no MinIO).
#
# DECISÃO (b) — exportamos só TABELAS-BASE. Toda a lógica das views da Elotech
# (bi.fin_*, folharh.*, aise.v_*, aise.tribview*) é REIMPLEMENTADA no ETL do
# ClickHouse. As views servem só de referência da regra (ver docs/):
#   - docs/coleta-rh-tabelas.md        (35 tabelas RH)
#   - docs/coleta-tributos-tabelas.md  (~90 tabelas Tributos)
#
# SEM FILTRO (dump FULL de todas as tabelas): por decisão, o `aise` NÃO usa filtro
# de `entidade` nem de `exercicio`/`anocompetencia` — exporta a tabela inteira. O
# recorte (entidade/ano), se necessário, fica no ETL do ClickHouse. Logo este
# manifest NÃO tem placeholders e dispensa `--var`.
#
# Rode com:
#   go run . --municipio <ibge> --ano <qualquer> --manifest manifests/elotech-aise.yaml
#   (--ano e --schema são irrelevantes: o schema vem do prefixo `aise.` no source.)
#
# Único ajuste por tabela: `exclude_columns` para os blobs `bytea` (não exportamos
# — só pesam o dump). Os rótulos de seção abaixo que mencionam "entidade"/"ano"
# são HISTÓRICOS (da coleta) — não há mais filtro.
#
# Tabelas COMPARTILHADAS com RH↔Tributos (pessoa, cidade, endereço, entidade…)
# aparecem UMA vez aqui (mesmo `aise_<tabela>` serve aos dois domínios).
# `aise.endereco` foi REMOVIDA: é VIEW (base = `enderecopessoa`); decisão (b).
bucket: mirante-parquet
tables:
