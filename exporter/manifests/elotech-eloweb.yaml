# Manifest Elotech eloweb (legado) — despesa + receita (raw).
# Schema contábil = `aise`; cliente/município = coluna `entidade` (NÃO é IBGE);
# ano = coluna `exercicio`. Rode com:
#   go run . --municipio <ibge> --ano <exercicio> --schema aise \
#            --manifest manifests/elotech-eloweb.yaml
#
# ⚠️ Preencha __ENTIDADE__ (código numérico do cliente em aise.entidade) e
#    __EXERCICIO__ (ano, ex.: 2025) abaixo. O --municipio (IBGE) é só o path no MinIO.
bucket: mirante-parquet
tables:
  # Dimensão do ente (entidade → nome/cnpj/identificacaotce). Contexto p/ o ETL.
  - source: entidade
    scope: tenant
    filters: { entidade: __ENTIDADE__ }

  # DESPESA
  - source: contempenho # empenho (cabeçalho + valores acumulados)
    scope: tenant
    filters: { entidade: __ENTIDADE__, exercicio: __EXERCICIO__ }
  - source: contitemempenho # itens do empenho
    scope: tenant
    filters: { entidade: __ENTIDADE__, exercicio: __EXERCICIO__ }
  - source: contliquidacao # liquidação
    scope: tenant
    filters: { entidade: __ENTIDADE__, exercicio: __EXERCICIO__ }
  - source: contpagamento # pagamento
    scope: tenant
    filters: { entidade: __ENTIDADE__, exercicio: __EXERCICIO__ }
  - source: contfichaempenho # ficha/dotação (contexto da despesa)
    scope: tenant
    filters: { entidade: __ENTIDADE__, exercicio: __EXERCICIO__ }

  # RECEITA
  - source: contreceita # cadastro/previsão da receita
    scope: tenant
    filters: { entidade: __ENTIDADE__, exercicio: __EXERCICIO__ }
  - source: contrealizacaoreceita # arrecadação realizada
    scope: tenant
    filters: { entidade: __ENTIDADE__, exercicio: __EXERCICIO__ }
  - source: contfichareceita # ficha da receita (contexto)
    scope: tenant
    filters: { entidade: __ENTIDADE__, exercicio: __EXERCICIO__ }
