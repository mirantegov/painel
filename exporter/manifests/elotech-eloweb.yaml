# Manifest Elotech eloweb (legado) — despesa/receita orçamentária (raw).
# Despesa e receita ORÇAMENTÁRIA ficam no schema `siscop`.
# (No `aise` ficam TRIBUTOS e RH — não entram aqui.)
# Cliente/município = coluna `entidade` (NÃO é IBGE); ano = coluna `exercicio`.
# Schema explícito no `source` define de onde ler; `scope` define só o path no
# MinIO (tenant=<ibge>/ · global=_global/).
#
# Rode com:
#   go run . --municipio <ibge> --ano <exercicio> \
#            --manifest manifests/elotech-eloweb.yaml
#
# ⚠️ Preencha __ENTIDADE__ (código do cliente em siscop.entidade) e
#    __EXERCICIO__ (ano, ex.: 2025).
#
# Obs.: órgão/unidade/função/subfunção/programa/ação/natureza são DERIVADOS de
#       siscop.despesa.programatica (SUBSTRING via niveismodelodespesa). Isso é
#       transform do ClickHouse (Épico 5) — aqui só raw. Ver
#       docs/epico5-elotech-queries.md.
bucket: mirante-parquet
tables:
  # ── Dimensão do ente ────────────────────────────────────────────
  - source: siscop.entidade # entidade, nome, cnpj, identificacaotce, tipoentidade
    scope: tenant
    filters: { entidade: __ENTIDADE__ }

  # ── Classificação da despesa (orçamentária) ─────────────────────
  - source: siscop.despesa # programatica, valorprevisto, modelodespesa, nivel, idnatureza…
    scope: tenant
    filters: { entidade: __ENTIDADE__, exercicio: __EXERCICIO__ }
  - source: siscop.niveismodelodespesa # modelo de níveis (parse de programatica); referência, sem coluna entidade
    scope: global

  # ── Execução (despesa/receita) — confirmar tabelas com as próximas queries ──
  # Candidatas encontradas no dump (siscop): empenho, emliquidacao, diarioarrecadacao.
  # Serão habilitadas quando as queries de empenho/liquidação/pagamento/receita
  # chegarem (cada FROM/JOIN confirma a tabela-fonte). Ex.:
  # - source: siscop.empenho
  #   scope: tenant
  #   filters: { entidade: __ENTIDADE__, exercicio: __EXERCICIO__ }
  # - source: siscop.emliquidacao
  #   scope: tenant
  #   filters: { entidade: __ENTIDADE__, exercicio: __EXERCICIO__ }
  # - source: siscop.diarioarrecadacao
  #   scope: tenant
  #   filters: { entidade: __ENTIDADE__, exercicio: __EXERCICIO__ }
