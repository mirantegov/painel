# Smoke manifest — valida conexão DB + Parquet + upload MinIO com volume mínimo.
# Uso: --schema siscop --manifest export-smoke.yaml --var ENTIDADES="1, 2, 3"
bucket: mirante-parquet
tables:
  - source: siscop.banco        # global, pequena — testa leitura + upload
    scope: global
  - source: siscop.entidade     # tenant filtrada — testa filtro por entidade + path <ibge>/
    scope: tenant
    filters: { entidade: [__ENTIDADES__] }
