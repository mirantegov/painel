# Nova Londrina (PR) — configuração de extração (SEM segredos; versionado).
# Segredos (DATABASE_URL do ERP + chaves MinIO) ficam em 4117107.secret.env (gitignored).
IBGE=4117107

# Entidades do município no ERP (prefeitura, câmara, RPPS…). Liste com a query do
# runbook (docs/runbook-exportador.md §2). Nova Londrina: 1=Prefeitura, 2=Câmara, 3=RPPS.
ENTIDADES="1, 2, 3"

# Janela de anos exportada p/ siscop (contábil) e aise (tributos/RH): (ano_atual - ANOS_BACK)..ano_atual.
# Auto-rola no cron. Para fixar uma lista, defina EXERCICIOS="2024, 2025, 2026".
ANOS_BACK=2

# Licitações/contratos (apice): exercícios de LIC_START..ano_atual (contratos antigos
# em andamento referenciam licitações antigas). Para fixar, defina EXERCICIOS_LIC=...
LIC_START=2000

# Quais schemas exportar (subconjunto de: siscop,aise,apice).
MANIFESTS="siscop,aise,apice"
